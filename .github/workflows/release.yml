name: release

on:
  push:
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    # 在老 glibc 的容器里编译：产出的 deb 兼容 Ubuntu 20.04+ / Debian 11+，
    # 直接跑在 ubuntu-latest(24.04, glibc 2.39)上编出的二进制装不进老系统
    container: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: build deb
        run: |
          apt-get update
          apt-get install -y --no-install-recommends gcc
          bash packaging/build-deb.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "*.deb"

  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: rockylinux:8
            label: el8
          - image: rockylinux:9
            label: el9
          # el10 需要时取消注释（官方 library 尚无 rockylinux:10，用组织镜像或 almalinux）
          # - image: rockylinux/rockylinux:10
          #   label: el10
          - image: fedora:latest
            label: fedora
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: build rpm
        run: |
          dnf -y install rpm-build gcc tar gzip

          mkdir -p "$HOME/rpmbuild/SOURCES"

          V=$(sed -n 's/^Version:[[:space:]]*//p' packaging/sckoc.spec)

          mkdir -p "/tmp/sckoc-$V"
          cp -r . "/tmp/sckoc-$V/"
          rm -rf "/tmp/sckoc-$V/.git"

          tar -C /tmp -czf "$HOME/rpmbuild/SOURCES/sckoc-$V.tar.gz" "sckoc-$V"

          rpmbuild -ba packaging/sckoc.spec

          # 只发布主包，debuginfo/debugsource 不上 Release
          cp "$HOME"/rpmbuild/RPMS/x86_64/sckoc-"$V"-*.rpm .

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.label }}
          path: "*.rpm"

  release:
    needs:
      - build-deb
      - build-rpm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true

      - name: Get latest release tag
        id: get_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            LATEST_TAG=$(gh release view --json tagName --template '{{.tagName}}' || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "未找到任何已有的 Release，手動運行失敗。"
              exit 1
            fi
            echo "TAG_NAME=$LATEST_TAG" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          fail_on_unmatched_files: false
          files: |
            *.deb
            *.rpm

  apt-repo:
    needs: build-deb
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deb
          path: .

      - name: build apt repo
        run: bash packaging/make-apt-repo.sh

      - name: publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: apt
          keep_files: false
