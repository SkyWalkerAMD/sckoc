name: release

on:
  push:
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build deb
        run: bash packaging/build-deb.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "*.deb"

  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: build rpm
        run: |
          dnf -y install rpm-build gcc tar gzip

          mkdir -p "$HOME/rpmbuild/SOURCES"

          V=$(sed -n 's/^Version:[[:space:]]*//p' packaging/sckoc.spec)

          mkdir -p "/tmp/sckoc-$V"
          cp -r . "/tmp/sckoc-$V/"
          rm -rf "/tmp/sckoc-$V/.git"

          tar -C /tmp -czf "$HOME/rpmbuild/SOURCES/sckoc-$V.tar.gz" "sckoc-$V"

          rpmbuild -ba packaging/sckoc.spec

          cp "$HOME"/rpmbuild/RPMS/x86_64/*.rpm .

      - uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: "*.rpm"

  release:
    needs:
      - build-deb
      - build-rpm
    runs-on: ubuntu-latest

    steps:
      # 修正：加上這一步，讓 GitHub CLI 能夠識別當前倉庫
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true

      - name: Get latest release tag
        id: get_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            LATEST_TAG=$(gh release view --json tagName --template '{{.tagName}}' || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "未找到任何已有的 Release，手動運行失敗。"
              exit 1
            fi
            echo "TAG_NAME=$LATEST_TAG" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          fail_on_unmatched_files: false
          files: |
            *.deb
            *.rpm

  apt-repo:
    needs: build-deb
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deb
          path: .

      - name: build apt repo
        run: bash packaging/make-apt-repo.sh

      - name: publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: apt
          keep_files: false
