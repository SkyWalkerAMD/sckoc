name: release

on:
  push:
    tags: ["*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 编译放进老 glibc 容器(ubuntu:20.04, glibc 2.31) → deb 兼容 Ubuntu 20.04+ / Debian 11+。
      # 注意不能用 container: 让整个 job 进老容器——Actions 的 checkout/upload 现在跑 Node 24,
      # 要求 glibc >= 2.34,老容器里会直接失败;所以 action 留在宿主机,只有编译进容器。
      - name: build deb in ubuntu:20.04
        run: |
          docker run --rm -v "$PWD":/src -w /src -e DEBIAN_FRONTEND=noninteractive ubuntu:20.04 bash -ec '
            apt-get update
            apt-get install -y --no-install-recommends gcc libc6-dev
            bash packaging/build-deb.sh
          '

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "*.deb"

  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: rockylinux:8
            label: el8
          - image: rockylinux:9
            label: el9
          # el10 需要时取消注释（官方 library 尚无 rockylinux:10 标签）
          # - image: rockylinux/rockylinux:10
          #   label: el10
          - image: fedora:latest
            label: fedora
    steps:
      - uses: actions/checkout@v4

      - name: build rpm in ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD":/src -w /src ${{ matrix.image }} bash -ec '
            dnf -y install rpm-build gcc make tar gzip
            V=$(sed -n "s/^Version:[[:space:]]*//p" packaging/sckoc.spec)
            mkdir -p /root/rpmbuild/SOURCES "/tmp/sckoc-$V"
            cp -r . "/tmp/sckoc-$V/"
            rm -rf "/tmp/sckoc-$V/.git"
            tar -C /tmp -czf "/root/rpmbuild/SOURCES/sckoc-$V.tar.gz" "sckoc-$V"
            rpmbuild -ba packaging/sckoc.spec
            # 只发布主包，debuginfo/debugsource 不上 Release
            cp /root/rpmbuild/RPMS/x86_64/sckoc-"$V"-*.rpm /src/
          '

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.label }}
          path: "*.rpm"

  release:
    needs:
      - build-deb
      - build-rpm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true

      - name: Get latest release tag
        id: get_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            LATEST_TAG=$(gh release view --json tagName --template '{{.tagName}}' || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "未找到任何已有的 Release，手動運行失敗。"
              exit 1
            fi
            echo "TAG_NAME=$LATEST_TAG" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          fail_on_unmatched_files: false
          files: |
            *.deb
            *.rpm

  apt-repo:
    needs: build-deb
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deb
          path: .

      - name: build apt repo
        run: bash packaging/make-apt-repo.sh

      - name: publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: apt
          keep_files: false
